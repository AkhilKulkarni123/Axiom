<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axiom</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="white">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <span>Axiom</span>
      </div>
      <div id="status" class="status status-ok">Ready</div>
    </div>

    <div class="section" id="profile-section">
      <div class="section-header">Your Profile</div>
      <div id="profile-summary" class="profile-summary">Loading...</div>
    </div>

    <div class="actions">
      <button class="action-btn" id="btn-summarize">
        <span class="action-icon">&#x1F4CB;</span>
        Summarize Page
      </button>
      <button class="action-btn" id="btn-confidence">
        <span class="action-icon">&#x1F50D;</span>
        Confidence Check
      </button>
      <button class="action-btn" id="btn-suggestions">
        <span class="action-icon">&#x1F4A1;</span>
        Suggestions
      </button>
      <button class="action-btn" id="btn-chat">
        <span class="action-icon">&#x1F4AC;</span>
        Chat with Axiom
      </button>
    </div>

    <div class="footer">
      <a href="#" id="btn-settings">Settings</a>
      <a href="#" id="btn-onboarding">Edit Profile</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
