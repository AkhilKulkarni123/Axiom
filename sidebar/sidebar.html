<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axiom Sidebar</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <span>Axiom</span>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="chat">Chat</button>
      <button class="tab" data-tab="reminders">Reminders</button>
      <button class="tab" data-tab="profile">Profile</button>
    </div>

    <!-- Chat Tab -->
    <div class="tab-content active" id="tab-chat">
      <div class="chat-messages" id="sidebar-chat-messages">
        <div class="chat-msg assistant">Hey! I'm Axiom. Ask me anything about this page, your goals, or anything else.</div>
      </div>
      <div class="chat-input-area">
        <textarea id="sidebar-chat-input" placeholder="Ask Axiom..." rows="1"></textarea>
        <button id="sidebar-chat-send">Send</button>
      </div>
    </div>

    <!-- Reminders Tab -->
    <div class="tab-content" id="tab-reminders">
      <div class="reminder-form">
        <input type="text" id="reminder-text" placeholder="Reminder text...">
        <input type="datetime-local" id="reminder-date">
        <button id="add-reminder" class="btn-small">Add Reminder</button>
      </div>
      <div id="reminder-list" class="reminder-list"></div>
    </div>

    <!-- Profile Tab -->
    <div class="tab-content" id="tab-profile">
      <div id="sidebar-profile"></div>
      <button id="edit-profile" class="btn-small" style="margin-top:12px">Edit Profile</button>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
